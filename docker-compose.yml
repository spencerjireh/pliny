services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: pliny
      POSTGRES_PASSWORD: pliny
      POSTGRES_DB: pliny
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliny -d pliny"]
      interval: 5s
      timeout: 3s
      retries: 10

