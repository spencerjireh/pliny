name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: pyright
        run: uv run pyright
      - name: pytest
        run: uv run pytest -q
        env:
          API_KEY: test-key

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Regenerate API types from FastAPI app
        run: make regen-types-static
      - name: Fail if generated types drifted from committed copy
        run: git diff --exit-code frontend/src/api/types.ts
